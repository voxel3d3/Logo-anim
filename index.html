<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voxel 3D Reveal</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

/* -----------------------------
   GLOBAL TIMELINE CONTROL
------------------------------*/
let startTime = performance.now();

/* -----------------------------
   PARTICLE CLASS
------------------------------*/
class Particle{
    constructor(){
        this.x = w/2;
        this.y = h/2;

        this.angle = Math.random()*Math.PI*2;
        this.radius = 10 + Math.random()*20;

        this.speed = 0; // starts frozen

        this.opacity = 0;
        this.size = Math.random()*2 + 1;
    }

    update(time){

        const t = (time - startTime)/1000;

        /* -------------------------
           0 - 3 seconds: BLACK SCREEN
        --------------------------*/
        if(t < 3){
            return; // nothing happens
        }

        /* -------------------------
           3 - 4 seconds: BIRTH PHASE
        --------------------------*/
        if(t > 3 && t < 4){
            this.opacity += 0.02;
        }

        /* -------------------------
           AFTER 4s: START MOTION
        --------------------------*/

        // acceleration curve (slow → fast)
        let accel = Math.min((t - 4) * 0.15, 6);

        this.speed += accel * 0.02;
        this.speed *= 0.98; // damping

        this.angle += this.speed;

        // OVAL / TIRE SHAPE (important improvement)
        const ovalX = 1.4;  // stretch horizontal
        const ovalY = 0.9;  // compress vertical

        this.x = w/2 + Math.cos(this.angle) * this.radius * ovalX;
        this.y = h/2 + Math.sin(this.angle) * this.radius * ovalY;

        // slow radius breathing (tire wobble feel)
        this.radius += Math.sin(t * 0.5) * 0.02;
    }

    draw(){
        if(this.opacity <= 1) this.opacity += 0.01;

        ctx.fillStyle = "white";
        ctx.globalAlpha = this.opacity;

        ctx.fillRect(this.x, this.y, this.size, this.size);

        ctx.globalAlpha = 1;
    }
}

/* -----------------------------
   PARTICLE SYSTEM
------------------------------*/
const particles = [];
const COUNT = 1800;

for(let i=0;i<COUNT;i++){
    particles.push(new Particle());
}

/* -----------------------------
   ANIMATION LOOP
------------------------------*/
function animate(time){

    requestAnimationFrame(animate);

    const t = (time - startTime)/1000;

    /* BLACK HOLD (clean start) */
    if(t < 3){
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,w,h);
        return;
    }

    /* motion trail */
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,w,h);

    for(let p of particles){
        p.update(time);
        p.draw();
    }
}

animate();
</script>

</body>
</html>
