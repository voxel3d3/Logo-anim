<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voxel 3D Reveal</title>

<style>
    html,body{
        margin:0;
        padding:0;
        overflow:hidden;
        background:#000;
    }
    canvas{
        display:block;
    }
</style>

</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

class Particle{
    constructor(){
        this.reset(true);
    }

    reset(init=false){
        const angle = Math.random()*Math.PI*2;
        const radius = Math.random()*200;

        this.x = w/2 + Math.cos(angle)*radius;
        this.y = h/2 + Math.sin(angle)*radius;

        // rotational velocity (tire spin effect)
        const speed = Math.random()*4 + 2;
        this.vx = -Math.sin(angle)*speed;
        this.vy = Math.cos(angle)*speed;

        // outward “mud splash”
        this.vx += (Math.random()-0.5)*6;
        this.vy += (Math.random()-0.5)*6;

        this.life = 1;
        this.decay = Math.random()*0.01 + 0.005;

        this.size = Math.random()*2 + 1;
    }

    update(){
        // center gravity pull (keeps motion circular)
        const dx = w/2 - this.x;
        const dy = h/2 - this.y;

        this.vx += dx * 0.0005;
        this.vy += dy * 0.0005;

        this.x += this.vx;
        this.y += this.vy;

        this.life -= this.decay;

        if(this.life <= 0) this.reset();
    }

    draw(){
        ctx.fillStyle = "white";
        ctx.globalAlpha = this.life;
        ctx.fillRect(this.x,this.y,this.size,this.size);
        ctx.globalAlpha = 1;
    }
}

const particles = [];
const COUNT = 1200;

for(let i=0;i<COUNT;i++){
    particles.push(new Particle());
}

function animate(){
    requestAnimationFrame(animate);

    // fade trail (important for motion feel)
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,w,h);

    for(let p of particles){
        p.update();
        p.draw();
    }
}

animate();
</script>

</body>
</html>
